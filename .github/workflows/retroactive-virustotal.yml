name: Retroactive VirusTotal Fix

on:
  workflow_dispatch:

jobs:
  fix-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fix broken VirusTotal links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          BROKEN_TAGS=$(gh release list --repo "$REPO" --limit 50 --json tagName,body \
            --jq '.[] | select(.body != null) | select(.body | contains("(/detection)")) | .tagName')

          if [ -z "$BROKEN_TAGS" ]; then
            echo "No broken releases found."
            exit 0
          fi

          echo "Broken releases: $BROKEN_TAGS"

          for TAG in $BROKEN_TAGS; do
            echo ""
            echo "Fixing $TAG..."

            mkdir -p /tmp/vt-apks

            gh release download "$TAG" --repo "$REPO" \
              --pattern "*arm64-v8a*release.apk" --dir /tmp/vt-apks --clobber 2>/dev/null || true
            gh release download "$TAG" --repo "$REPO" \
              --pattern "*armeabi-v7a*release.apk" --dir /tmp/vt-apks --clobber 2>/dev/null || true
            gh release download "$TAG" --repo "$REPO" \
              --pattern "*x86_64*release.apk" --dir /tmp/vt-apks --clobber 2>/dev/null || true

            APK_COUNT=$(ls /tmp/vt-apks/*.apk 2>/dev/null | wc -l)
            if [ "$APK_COUNT" -eq 0 ]; then
              echo "  No APKs found, skipping"
              rm -rf /tmp/vt-apks
              continue
            fi

            VT_SECTION=$'\n\n<details>\n<summary>VirusTotal Analysis</summary>\n\n'

            for APK in $(ls /tmp/vt-apks/*.apk | sort); do
              FILENAME=$(basename "$APK")
              SHA256=$(sha256sum "$APK" | awk '{print $1}')

              VT_CHECK=$(curl -s \
                "https://www.virustotal.com/api/v3/files/${SHA256}" \
                -H "x-apikey: ${VT_API_KEY}")

              if ! echo "$VT_CHECK" | grep -q '"data"'; then
                echo "  Submitting $FILENAME to VT..."
                curl -s -X POST \
                  "https://www.virustotal.com/api/v3/files" \
                  -H "x-apikey: ${VT_API_KEY}" \
                  -F "file=@${APK}" > /dev/null
              fi

              URL="https://www.virustotal.com/gui/file/${SHA256}/detection"
              VT_SECTION+="- [${FILENAME}](${URL})"$'\n'
              echo "  $FILENAME -> $URL"
            done

            VT_SECTION+=$'\n</details>'

            CURRENT_BODY=$(gh release view "$TAG" --repo "$REPO" --json body -q .body)

            CLEAN_BODY=$(python3 -c "
import sys
body = sys.stdin.read()
for marker in ['\n\n---\n**VirusTotal Analysis**', '\n\n<details>\n<summary>VirusTotal Analysis</summary>']:
    idx = body.rfind(marker)
    if idx != -1:
        body = body[:idx]
        break
sys.stdout.write(body)
" <<< "$CURRENT_BODY")

            NOTES_FILE=$(mktemp)
            printf '%s%s' "$CLEAN_BODY" "$VT_SECTION" > "$NOTES_FILE"
            gh release edit "$TAG" --repo "$REPO" --notes-file "$NOTES_FILE"
            rm "$NOTES_FILE"

            echo "  Updated $TAG"
            rm -rf /tmp/vt-apks
          done

          echo ""
          echo "Done!"
